<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Articolo</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/page.css">
</head>
<body data-page="articles">
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Preventivatore <span>v1</span></div>
            <nav class="nav">
                <a data-page="dashboard" href="index.html">Dashboard</a>
                <a data-page="materials" href="materials.html">Materiali</a>
                <a data-page="inventory" href="inventory.html">Magazzino</a>
                <a data-page="articles" href="articles.html">Articoli</a>
                <a data-page="orders" href="orders.html">Ordini</a>
            </nav>
        </aside>
        <main class="content">
            <div class="topbar">
                <div class="page-title">
                    <h1 id="detail-title">Dettaglio Articolo</h1>
                    <p id="detail-subtitle">Scheda completa costi e composizione.</p>
                </div>
                <div class="actions">
                    <a class="btn-small" href="articles.html">Torna alla lista</a>
                    <a id="edit-link" class="btn-small" href="#">Modifica</a>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="card">
                <div class="form-row">
                    <div class="form-group">
                        <label>Codice</label>
                        <div id="detail-code">-</div>
                    </div>
                    <div class="form-group">
                        <label>Nome</label>
                        <div id="detail-name">-</div>
                    </div>
                    <div class="form-group">
                        <label>Ore Lavoro</label>
                        <div id="detail-hours">-</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ricarica Materiale %</label>
                        <div id="detail-mat-markup">-</div>
                    </div>
                    <div class="form-group">
                        <label>Ricarica Lavoro %</label>
                        <div id="detail-lab-markup">-</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Composizione</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Materiale</th>
                                <th>Descrizione</th>
                                <th>Quantita</th>
                                <th>Costo</th>
                            </tr>
                        </thead>
                        <tbody id="detail-composition"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h3>Preview Costi e Prezzi</h3>
                <div class="preview-grid">
                    <div class="preview-item">
                        <label>Costo Materiale</label>
                        <div id="preview-material-cost" class="preview-value">EUR 0.00</div>
                    </div>
                    <div class="preview-item">
                        <label>Prezzo Materiale (+ ricariche)</label>
                        <div id="preview-material-sell" class="preview-value">EUR 0.00</div>
                    </div>
                    <div class="preview-item">
                        <label>Costo Lavoro</label>
                        <div id="preview-labor-cost" class="preview-value">EUR 0.00</div>
                    </div>
                    <div class="preview-item">
                        <label>Prezzo Lavoro (+ ricariche)</label>
                        <div id="preview-labor-sell" class="preview-value">EUR 0.00</div>
                    </div>
                    <div class="preview-item">
                        <label>Ricarica Colore/Comp.</label>
                        <div id="preview-color-surcharge" class="preview-value">EUR 0.00</div>
                    </div>
                    <div class="preview-item total">
                        <label>Totale Vendita (Materiale + Lavoro)</label>
                        <div id="preview-total-sell" class="preview-value">EUR 0.00</div>
                    </div>
                    <div class="preview-item">
                        <label>Marginalita Materiale</label>
                        <div id="preview-material-margin" class="preview-value">EUR 0.00</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../scripts/shared.js"></script>
    <script src="../scripts/article-detail.js"></script>
</body>
</html>
