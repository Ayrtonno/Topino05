<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colori</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/page.css">
</head>
<body data-page="colors">
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Preventivatore <span>v1</span></div>
            <nav class="nav">
                <a data-page="dashboard" href="index.html">Dashboard</a>
                <a data-page="materials" href="materials.html">Materiali</a>
                <a data-page="colors" href="colors.html">Colori</a>
                <a data-page="articles" href="articles.html">Articoli</a>
                <a data-page="orders" href="orders.html">Ordini</a>
            </nav>
        </aside>
        <main class="content">
            <div class="topbar">
                <div class="page-title">
                    <h1>Giacenza Colori</h1>
                    <p>Gestione colori e disponibilita per materiale.</p>
                </div>
                <div class="actions">
                    <span class="chip">Palette</span>
                    <button id="toggle-form" class="btn-primary">+ Nuovo Colore</button>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="toolbar">
                <div class="left">
                    <div class="field">
                        <input id="search-colors" type="text" placeholder="Cerca colore..." />
                    </div>
                    <div class="field">
                        <select id="filter-material">
                            <option value="">Tutti i materiali</option>
                        </select>
                    </div>
                </div>
                <div class="right">
                    <span class="badge primary">Palette</span>
                </div>
            </div>

            <form id="color-form" class="form hidden">
                <div class="form-group">
                    <label>Materiale *</label>
                    <select id="color-material">
                        <option value="">Seleziona un materiale</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Nome Colore *</label>
                        <input id="color-name" type="text" placeholder="Es: Rosso, Blu" />
                    </div>
                    <div class="form-group">
                        <label>Codice Colore</label>
                        <input id="color-code" type="text" placeholder="Es: #FF0000" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Stock in Grammi *</label>
                    <input id="color-stock" type="number" value="0" />
                </div>

                <button id="submit-color" type="submit" class="btn-primary">Aggiungi Colore</button>
            </form>

            <div class="table-header">
                <div class="title">Elenco Colori</div>
                <div class="meta">Giacenze per materiale</div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Materiale</th>
                            <th>Colore</th>
                            <th>Codice</th>
                            <th>Stock (g)</th>
                            <th>Ultimo Aggiornamento</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="colors-body"></tbody>
                </table>
                <div id="colors-empty" class="empty-state hidden">Nessun colore presente.</div>
            </div>
        </main>
    </div>

    <script src="../scripts/shared.js"></script>
    <script src="../scripts/colors.js"></script>
</body>
</html>
