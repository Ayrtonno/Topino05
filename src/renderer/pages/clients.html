<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clienti</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/page.css">
</head>
<body data-page="clients">
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Preventivatore</div>
            <nav class="nav">
                <a data-page="dashboard" href="index.html">Dashboard</a>
                <a data-page="clients" href="clients.html">Clienti</a>
                <a data-page="materials" href="materials.html">Materiali</a>
                <a data-page="inventory" href="inventory.html">Magazzino Materiale</a>
                <a data-page="deposit" href="deposito.html">Deposito</a>
                <a data-page="articles" href="articles.html">Articoli</a>
                <a data-page="orders" href="orders.html">Ordini</a>
                <a data-page="orders-production" href="orders-production.html">Ordini in Produzione</a>
            </nav>
        </aside>
        <main class="content">
            <div class="topbar">
                <div class="page-title">
                    <h1>Clienti</h1>
                    <p>Gestione anagrafiche clienti.</p>
                </div>
                <div class="actions">
                    <button id="refresh-clients" class="btn-small">Aggiorna</button>
                    <button id="new-client" class="btn-primary">+ Nuovo Cliente</button>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="toolbar">
                <div class="left">
                    <div class="field">
                        <select id="sort-clients">
                            <option value="name-asc">Nome (A-Z)</option>
                            <option value="name-desc">Nome (Z-A)</option>
                            <option value="email-asc">Mail (A-Z)</option>
                            <option value="email-desc">Mail (Z-A)</option>
                            <option value="phone-asc">Telefono (A-Z)</option>
                            <option value="phone-desc">Telefono (Z-A)</option>
                        </select>
                    </div>
                </div>
                <div class="right">
                    <span class="badge primary">Clienti</span>
                </div>
            </div>

            <form id="client-form" class="form hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome *</label>
                        <input id="client-first-name" type="text" placeholder="Nome" />
                    </div>
                    <div class="form-group">
                        <label>Cognome *</label>
                        <input id="client-last-name" type="text" placeholder="Cognome" />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input id="client-email" type="email" placeholder="email@example.com" />
                    </div>
                    <div class="form-group">
                        <label>Telefono</label>
                        <input id="client-phone" type="tel" placeholder="+39 ..." />
                    </div>
                </div>
                <button id="client-submit" type="submit" class="btn-primary">Salva Cliente</button>
            </form>

            <div id="clients-list-section">
                <div class="table-header">
                    <div class="title">Elenco Clienti</div>
                    <div class="meta">Mostra tutti i clienti salvati</div>
                </div>
                <div class="table-container list-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Mail</th>
                                <th>Telefono</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="clients-body"></tbody>
                    </table>
                    <div id="clients-empty" class="empty-state hidden">Nessun cliente presente.</div>
                </div>
            </div>
        </main>
    </div>

    <script src="../scripts/shared.js"></script>
    <script src="../scripts/clients.js"></script>
</body>
</html>
