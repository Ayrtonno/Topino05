<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiali</title>
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/page.css">
</head>
<body data-page="materials">
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Topino05</div>
            <nav class="nav">
                <a data-page="dashboard" href="index.html">Dashboard</a>
                <a data-page="clients" href="clients.html">Clienti</a>
                <a data-page="materials" href="materials.html">Materiali</a>
                <a data-page="inventory" href="inventory.html">Magazzino Materiale</a>
                <a data-page="deposit" href="deposito.html">Deposito</a>
                <a data-page="articles" href="articles.html">Articoli</a>
                <a data-page="orders" href="orders.html">Ordini</a>
                <a data-page="orders-production" href="orders-production.html">Ordini in Produzione</a>
            </nav>
        </aside>
        <main class="content">
            <div class="topbar">
                <div class="page-title">
                    <h1>Magazzino Materia Prima</h1>
                    <p>Gestione materiali, costi e scorte.</p>
                </div>
                <div class="actions">
                    <button id="refresh-materials" class="btn-small">Aggiorna</button>
                    <button id="toggle-form" class="btn-primary">Nuovo Materiale</button>
                </div>
            </div>

            <div id="message" class="message"></div>

            <div class="toolbar">
                <div class="left">
                    <div class="field">
                        <input id="search-materials" type="text" placeholder="Cerca materiale..." />
                    </div>
                    <div class="field">
                        <select id="sort-materials">
                            <option value="name-asc">Nome (A-Z)</option>
                            <option value="name-desc">Nome (Z-A)</option>
                            <option value="cost-asc">Costo (crescente)</option>
                            <option value="cost-desc">Costo (decrescente)</option>
                            <option value="selling-asc">Prezzo vendita (crescente)</option>
                            <option value="selling-desc">Prezzo vendita (decrescente)</option>
                            <option value="unit-asc">Unita (A-Z)</option>
                            <option value="unit-desc">Unita (Z-A)</option>
                        </select>
                    </div>
                </div>
                <div class="right">
                    <span class="badge primary">Stock</span>
                </div>
            </div>

            <form id="material-form" class="form hidden">
                <div class="form-group">
                    <label>Nome Materiale *</label>
                    <input id="mat-name" type="text" placeholder="Es: Lana, Ovatta, Fettuccia" />
                </div>

                <div class="form-row">
                <div class="form-group">
                    <label>Costo unitario (EUR) *</label>
                    <input id="mat-cost" type="number" step="0.001" value="0" />
                </div>
                <div class="form-group">
                    <label>Prezzo vendita unitario (EUR)</label>
                    <input id="mat-selling" type="number" step="0.001" value="0" />
                </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Unita di misura</label>
                        <select id="mat-unit">
                            <option value="grammi">Grammi (€/g)</option>
                            <option value="pezzi">Pezzi (€/pz)</option>
                        </select>
                    </div>
                </div>

                <button id="submit-material" type="submit" class="btn-primary">Aggiungi Materiale</button>
            </form>

            <div class="table-header">
                <div class="title">Elenco Materiali</div>
                <div class="meta">Prezzi e disponibilita aggiornati</div>
            </div>
            <div class="table-container list-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Costo unitario</th>
                            <th>Prezzo vendita</th>
                            <th>Unita</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="materials-body"></tbody>
                </table>
                <div id="materials-empty" class="empty-state hidden">Nessun materiale presente.</div>
            </div>
        </main>
    </div>

    <script src="../scripts/shared.js"></script>
    <script src="../scripts/materials.js"></script>
</body>
</html>
